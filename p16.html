<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bitácora - P16</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { background: white; padding: 20px; max-width: 1200px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { font-size: 1.5em; margin: 5px 0; color: #333; }
        h2, h3 { font-size: 1.1em; color: #555; margin: 5px 0; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th, td { border: 1px solid #333; padding: 8px; vertical-align: top; }
        th { background-color: #444; color: white; text-align: center; }
        input[type="text"], input[type="date"], input[type="time"], select { width: 95%; padding: 5px; margin-top: 5px; border: 1px solid #ccc; }
        .radio-group { font-size: 0.9em; margin-top: 10px; }
        .btn-container { text-align: right; margin-top: 20px; }
        button { padding: 10px 20px; background-color: #002b5c; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>FACULTAD DE INGENIERÍA MOCHIS</h1>
            <h2>COORDINACIÓN DE CENTROS DE CÓMPUTO Y RED ESCOLAR</h2>
            <h3>BITÁCORA DE PRÉSTAMO DE EQUIPOS</h3>
        </div>
        <form>
            <table>
                <tr>
                    <th width="20%">Datos del Usuario</th><th width="15%">Carrera / Grupo</th><th width="10%">Tipo</th><th width="20%">Equipo en Préstamo</th><th width="17%">Registro Salida</th><th width="17%">Registro Entrega</th>
                </tr>
                <tr>
                    <td>Nombre:<br><input type="text" placeholder="Nombre completo"></td>
                    <td><select><option>C (Civil)</option><option>S (Software)</option></select><br><input type="text" placeholder="Grupo"></td>
                    <td><div class="radio-group"><input type="radio" name="t1"> Alum <input type="radio" name="t1"> Profr</div></td>
                    <td><input type="text" placeholder="Descripción"></td>
                    <td>Fecha: <input type="date"><br>Hora: <input type="time"><br>Firma: <input type="text"></td>
                    <td>Fecha: <input type="date"><br>Hora: <input type="time"><br>Firma: <input type="text"></td>
                </tr>
            </table>
            <div class="btn-container">
                <button type="reset" style="background:#dc3545;">Limpiar Formulario</button>
                <button type="submit">Guardar Registros</button>
            </div>
        </form>
    </div>
</body>
</html>
