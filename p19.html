<div id="salida"></div>
<script>
    let datos = "Juan Pérez, Ing. Software";
    document.write("Salida con document.write: " + datos + "<br>");
    alert("Salida con alert: " + datos);
    console.log("Salida con console.log: " + datos);
    document.getElementById("salida").innerHTML = "Salida con innerHTML: " + datos;
</script>
