Límite: <input type="number" id="lim" value="10">
<button onclick="tablas()">Generar</button><div id="r"></div>
<script>
    function tablas() {
        let lim = Number(document.getElementById('lim').value);
        let out = "";
        for(let i=1; i<=lim; i++) {
            out += `<b>Tabla del ${i}:</b><br>`;
            for(let j=1; j<=10; j++) out += `${i} x ${j} = ${i*j}<br>`;
            out += "<br>";
        }
        document.getElementById('r').innerHTML = out;
    }
</script>
