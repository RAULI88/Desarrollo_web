<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Práctica 20 - Operaciones</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background-color: #f0f4f8; display: flex; justify-content: center; }
        .container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #004a99; margin-top: 0; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; background-color: #17a2b8; margin-top: 10px; }
        button:hover { opacity: 0.8; }
        #resultado { margin-top: 20px; padding: 15px; border-radius: 4px; background: #e9ecef; font-weight: bold; text-align: center; color: #333; min-height: 20px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Operaciones JS</h2>
        <div class="input-group">
            <label for="numA">Variable A:</label>
            <input type="number" id="numA" placeholder="Ingresa primer número">
        </div>
        <div class="input-group">
            <label for="numB">Variable B:</label>
            <input type="number" id="numB" placeholder="Ingresa segundo número">
        </div>
        <button onclick="calcularTodo()">Calcular Todo</button>
        <div id="resultado">Los resultados aparecerán aquí</div>
    </div>

    <script>
        function calcularTodo() {
            let a = Number(document.getElementById('numA').value);
            let b = Number(document.getElementById('numB').value);
            if (document.getElementById('numA').value === "" || document.getElementById('numB').value === "") {
                document.getElementById('resultado').innerHTML = "⚠️ Por favor, llena ambos campos";
                return;
            }
            document.getElementById('resultado').innerHTML = `
                Suma: ${a+b} <br> 
                Resta: ${a-b} <br> 
                División: ${b !== 0 ? (a/b) : "Error (Div/0)"} <br> 
                Exponenciación: ${a**b}
            `;
        }
    </script>
</body>
</html>
