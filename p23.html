<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Práctica 23 - IMC</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background-color: #f0f4f8; display: flex; justify-content: center; }
        .container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #004a99; margin-top: 0; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; background-color: #6f42c1; margin-top: 10px; }
        button:hover { opacity: 0.8; }
        #resultado { margin-top: 20px; padding: 15px; border-radius: 4px; background: #e9ecef; font-weight: bold; text-align: center; color: #333; min-height: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Calculadora IMC </h2>
        <div class="input-group">
            <label>Peso (en kg):</label>
            <input type="number" id="peso" placeholder="Ej. 65">
        </div>
        <div class="input-group">
            <label>Altura (en metros):</label>
            <input type="number" step="0.01" id="altura" placeholder="Ej. 1.65">
        </div>
        <button onclick="calcularIMC()">Calcular IMC</button>
        <div id="resultado">Tu IMC aparecerá aquí</div>
    </div>

    <script>
        function calcularIMC() {
            let p = Number(document.getElementById('peso').value);
            let a = Number(document.getElementById('altura').value);
            if (p <= 0 || a <= 0) {
                document.getElementById('resultado').innerHTML = "⚠️ Ingresa valores válidos.";
                return;
            }
            
            let imc = p / (a * a);
            let grado = "";
            if(imc < 18.5) grado = "Bajo peso";
            else if(imc < 24.9) grado = "Normal";
            else if(imc < 29.9) grado = "Sobrepeso";
            else grado = "Obesidad";
            
            document.getElementById('resultado').innerText = `IMC: ${imc.toFixed(1)} - Grado: ${grado}`;
        }
    </script>
</body>
</html>
