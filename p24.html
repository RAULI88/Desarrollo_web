<script>
    let d = new Date(), dias = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"], meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    let diaTxt, mesTxt;
    switch(d.getDay()){ case 0: diaTxt=dias[0]; break; case 1: diaTxt=dias[1]; break; case 2: diaTxt=dias[2]; break; case 3: diaTxt=dias[3]; break; case 4: diaTxt=dias[4]; break; case 5: diaTxt=dias[5]; break; case 6: diaTxt=dias[6]; break; }
    switch(d.getMonth()){ case 2: mesTxt=meses[2]; break; case 3: mesTxt=meses[3]; break; /* ... */ } 
    // Para simplificar, obtenemos los valores directamente en la prueba
    document.write(`Hoy es ${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]} del año ${d.getFullYear()}`);
</script>
