<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitácora de Préstamo de Equipos - FIM</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        .header {
            text-align: center;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        h1 { margin: 5px 0; font-size: 1.5em; }
        h2 { margin: 5px 0; font-size: 1.2em; color: #555; }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            font-size: 0.85em;
        }
        th, td {
            border: 1px solid #000;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #333;
            color: white;
            text-align: center;
        }
        .section-title {
            background-color: #e0e0e0;
            font-weight: bold;
            text-align: center;
        }
        input[type="text"], input[type="date"], input[type="time"], select {
            width: 95%;
            padding: 4px;
            border: 1px solid #ccc;
        }
        .radio-group {
            display: flex;
            gap: 5px;
            font-size: 0.8em;
            justify-content: center;
        }
        .btn-container {
            margin-top: 20px;
            text-align: right;
        }
        button {
            padding: 10px 20px;
            background-color: #004a99;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #003366; }
    </style>
</head>
<body>

    <div class="header">
        <h1>FACULTAD DE INGENIERÍA MOCHIS</h1>
        <h2>COORDINACIÓN DE CENTROS DE CÓMPUTO Y RED ESCOLAR</h2>
        <h3>BITÁCORA DE PRÉSTAMO DE EQUIPOS</h3>
    </div>

    <form>
        <table>
            <thead>
                <tr>
                    <th width="20%">Datos del Usuario</th>
                    <th width="15%">Carrera / Grupo</th>
                    <th width="10%">Tipo</th>
                    <th width="20%">Equipo en Préstamo</th>
                    <th width="17%">Registro de Salida</th>
                    <th width="17%">Registro de Entrega</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <label>Nombre:</label>
                        <input type="text" name="nombre1" placeholder="Nombre completo">
                    </td>
                    <td>
                        <select name="carrera1">
                            <option value="C">C (Civil)</option>
                            <option value="G">G (Geodesia)</option>
                            <option value="S">S (Software)</option>
                            <option value="IP">IP (Procesos)</option>
                            <option value="IN">IN (Industrial)</option>
                        </select>
                        <br><br>
                        <input type="text" name="grupo1" placeholder="Grupo">
                    </td>
                    <td>
                        <div class="radio-group">
                            <label><input type="radio" name="tipo1" value="A"> Alum</label>
                            <label><input type="radio" name="tipo1" value="P"> Profr</label>
                        </div>
                    </td>
                    <td>
                        <input type="text" name="prestamo1" placeholder="Descripción del equipo">
                    </td>
                    <td>
                        <label>Fecha:</label> <input type="date" name="fecha_p1"><br>
                        <label>Hora:</label> <input type="time" name="hora_p1"><br>
                        <label>Firma:</label> <input type="text" name="firma_p1">
                    </td>
                    <td>
                        <label>Fecha:</label> <input type="date" name="fecha_e1"><br>
                        <label>Hora:</label> <input type="time" name="hora_e1"><br>
                        <label>Firma:</label> <input type="text" name="firma_e1">
                    </td>
                </tr>
                
                <tr>
                    <td>
                        <label>Nombre:</label>
                        <input type="text" name="nombre2" placeholder="Nombre completo">
                    </td>
                    <td>
                        <select name="carrera2">
                            <option value="C">C</option>
                            <option value="G">G</option>
                            <option value="S" selected>S</option>
                            <option value="IP">IP</option>
                            <option value="IN">IN</option>
                        </select>
                        <br><br>
                        <input type="text" name="grupo2" placeholder="Grupo">
                    </td>
                    <td>
                        <div class="radio-group">
                            <label><input type="radio" name="tipo2" value="A"> Alum</label>
                            <label><input type="radio" name="tipo2" value="P"> Profr</label>
                        </div>
                    </td>
                    <td>
                        <input type="text" name="prestamo2" placeholder="Descripción del equipo">
                    </td>
                    <td>
                        <label>Fecha:</label> <input type="date" name="fecha_p2"><br>
                        <label>Hora:</label> <input type="time" name="hora_p2"><br>
                        <label>Firma:</label> <input type="text" name="firma_p2">
                    </td>
                    <td>
                        <label>Fecha:</label> <input type="date" name="fecha_e2"><br>
                        <label>Hora:</label> <input type="time" name="hora_e2"><br>
                        <label>Firma:</label> <input type="text" name="firma_e2">
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="btn-container">
            <button type="reset">Limpiar Formulario</button>
            <button type="submit">Guardar Registros</button>
        </div>
    </form>

</body>
</html>
