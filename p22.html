a: <input type="number" id="a"> b: <input type="number" id="b"> c: <input type="number" id="c">
<button onclick="fg()">Calcular x1 y x2</button><p id="r"></p>
<script>
    function fg() {
        let a = Number(document.getElementById('a').value), b = Number(document.getElementById('b').value), c = Number(document.getElementById('c').value);
        let d = (b*b) - (4*a*c);
        if(d < 0) return document.getElementById('r').innerText = "Raíces imaginarias";
        let x1 = (-b + Math.sqrt(d)) / (2*a), x2 = (-b - Math.sqrt(d)) / (2*a);
        document.getElementById('r').innerText = `x1 = ${x1.toFixed(2)}, x2 = ${x2.toFixed(2)}`;
    }
</script>
